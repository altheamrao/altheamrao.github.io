<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>strike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 32px 24px;
    }

    .context {
      text-align: center;
      line-height: 2;
      font-size: clamp(11px, 3vw, 13px);
      opacity: 0.4;
      max-width: 320px;
    }

    button {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.6);
      font-family: monospace;
      font-size: clamp(12px, 3.5vw, 14px);
      letter-spacing: 0.15em;
      padding: 18px 48px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, color 0.2s;
    }

    button:hover, button:active {
      border-color: rgba(255,255,255,0.7);
      color: rgba(255,255,255,0.9);
    }

    button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .status {
      font-size: clamp(10px, 2.5vw, 11px);
      opacity: 0;
      letter-spacing: 0.1em;
      min-height: 16px;
      transition: opacity 0.4s;
    }

    .status.visible { opacity: 0.6; }

    .weather {
      font-size: clamp(10px, 2.5vw, 11px);
      line-height: 2;
      opacity: 0;
      text-align: center;
      transition: opacity 1s;
      width: 100%;
      max-width: 320px;
    }

    .weather.visible { opacity: 0.3; }

    .weather .site {
      opacity: 0.5;
      margin-bottom: 4px;
    }

    .weather .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="context">
    March 2026 · UAE · Bahrain<br>
    first targeted military strike<br>
    on a hyperscale cloud provider
  </div>

  <button id="btn">[ strike ]</button>

  <div class="status" id="status"></div>

  <div class="weather" id="weather"></div>

  <script>
    const STRIKE_TOPIC  = "cwdnimfsfrsyaqbj";
    const WEATHER_TOPIC = "wwbyzyrelqkedmhg";

    const btn     = document.getElementById("btn");
    const status  = document.getElementById("status");
    const weather = document.getElementById("weather");

    // Strike button
    function showStatus(msg, duration = 3000) {
      status.textContent = msg;
      status.classList.add("visible");
      setTimeout(() => status.classList.remove("visible"), duration);
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      try {
        await fetch(`https://ntfy.sh/${STRIKE_TOPIC}`, { method: "POST", body: "neon" });
        showStatus("strike transmitted");
      } catch {
        showStatus("transmission failed");
      } finally {
        setTimeout(() => { btn.disabled = false; }, 4000);
      }
    });

    // Weather display
    function renderWeather(d) {
      weather.innerHTML = `
        <div class="site">${d.site}</div>
        <hr class="divider">
        <div>wind &nbsp;&nbsp;&nbsp;&nbsp;${d.raw.windSpeed.toFixed(1)} m/s · ${d.raw.windDeg}°</div>
        <div>humidity &nbsp;${d.raw.humidity}%</div>
        <div>cloud cover ${(d.raw.cloudCover * 100).toFixed(0)}%</div>
        <div>pressure &nbsp;${d.raw.pressure} hPa</div>
        <hr class="divider">
        <div>status &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${d.uniforms.maxStatus} / 3</div>
        <div>services impacted ${d.uniforms.totalImpacted}</div>
        <div>incident updates &nbsp;${d.uniforms.totalUpdates}</div>
        <div>incident age &nbsp;&nbsp;&nbsp;&nbsp;${Math.round(d.uniforms.incidentAge)}h</div>
      `;
      weather.classList.add("visible");
    }

    async function subscribeWeather() {
      try {
        const res = await fetch(`https://ntfy.sh/${WEATHER_TOPIC}/json?since=12h`);
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const lines = decoder.decode(value).split("\n").filter(Boolean);
          for (const line of lines) {
            try {
              const envelope = JSON.parse(line);
              if (envelope.event === "message") {
                const data = JSON.parse(envelope.message);
                if (data.type === "weather") renderWeather(data);
              }
            } catch {}
          }
        }
      } catch {}
      setTimeout(subscribeWeather, 5000);
    }

    subscribeWeather();
  </script>
</body>
</html>
